<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://cdni.iconscout.com/illustration/free/thumb/free-concept-of-to-do-list-illustration-svg-download-png-1785604.png" type="image/x-icon">
    <title>Lista de Tarefas Peronalizada</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="main">
        <h1>To-do List Games 🎮</h1>
        <p>Bem-vindo! Insira os jogos que deseja jogar e planeje melhor sua jogatina.</p>
        
        <div id="taskGamesContainer">
            <input type="text" id="gameInput" placeholder="Digite um novo game">
            <input type="text" id="gameCategoria" placeholder="Digite a categoria do game">
            <button onclick="addTask()">
                Adicionar Game
            </button>
        </div>

        <ul id="gameList"></ul>
    </main>

    <script src="script.js"></script>
</body>
</html>
